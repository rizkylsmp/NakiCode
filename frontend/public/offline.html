<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Naki Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #172447 0%, #0f1729 100%);
      color: #e8edf5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.7;
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 16px;
      color: #ffffff;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
      color: #b8c5d8;
    }
    .button {
      display: inline-block;
      padding: 12px 32px;
      background: #4a90e2;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.3s ease;
    }
    .button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Tidak Ada Koneksi Internet</h1>
    <p>Sepertinya kamu sedang offline. Periksa koneksi internet dan coba lagi.</p>
    <a href="/" class="button" onclick="window.location.reload(); return false;">
      Coba Lagi
    </a>
  </div>
</body>
</html>
